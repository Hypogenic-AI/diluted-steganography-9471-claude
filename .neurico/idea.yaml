idea:
  title: Diluted Steganography
  domain: nlp
  hypothesis: 'Investigate how current large language models (LLMs) handle signal
    dilution in steganographic contexts, specifically when secret messages are embedded
    in more diluted patterns (e.g., the word after each use of a specific trigger
    word), compared to more obvious patterns such as acrostics.

    '
  background:
    description: 'As data generation becomes cheaper and more prevalent, the dilution
      of meaningful signals within large volumes of generated text is likely to become
      a significant issue. Current LLMs can detect secret messages hidden in simple
      patterns, such as the first letter of each line, when prompted. This research
      explores how well LLMs can detect or extract messages when the signal is more
      diluted, such as embedding information in the word following each occurrence
      of a specific word within the text.

      '
  metadata:
    author: Ari Holtzman
    source: IdeaHub
    source_url: https://hypogenic.ai/ideahub/idea/S8TIDAdqCMWSFklZugeh
